<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$MIM RUNNER v2 — Magic Internet Money</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#04010f; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; user-select:none; }
canvas { border:4px solid #f0c040; box-shadow:0 0 30px rgba(240,192,64,.6),0 0 80px rgba(100,60,220,.4); display:block; max-width:100vw; cursor:pointer; }
#tag{color:#f0c040;font:bold 12px Arial Black;letter-spacing:4px;margin-top:9px;opacity:.75;text-align:center;}
</style>
</head>
<body>
<canvas id="c" width="900" height="420"></canvas>
<div id="tag">MAGIC INTERNET MONEY · ORDINALS · RUNES · $MIM</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const W=900,H=420,G=330;
const PH=90,DH=42;
const HBX=16,HBY=16,HBW=40,HBH=PH-24;

let ST='start',score=0,best=0,frm=0,spd=5,waitingForName=false;
const P={ x:82, y:G-PH, vy:0, grav:.58, jp:-14.5, jumps:2, af:0, ducking:false, get grounded(){return this.y>=(G-(this.ducking?DH:PH))-1;} };
let obs=[],coins=[],parts=[],floats=[];

// Leaderboard Storage
function getLB() { return JSON.parse(localStorage.getItem('mimLB') || '[]'); }
function saveLB(name, s) {
  let b = getLB();
  b.push({name, s});
  b.sort((a,b)=>b.s-a.s);
  localStorage.setItem('mimLB', JSON.stringify(b.slice(0,5)));
}

// Background Setup
let stars=Array.from({length:68},()=>({x:Math.random()*W,y:Math.random()*230,r:Math.random()*2.2+.3,t:Math.random()*Math.PI*2,sp:.07+Math.random()*.18}));
let bldgs=[];
for(let x=-50;x<W+250;x+=44+Math.floor(Math.random()*56)){
  bldgs.push({x,y:G-(40+Math.random()*140),w:26+Math.random()*52,h:40+Math.random()*140,col:['#100528','#071535','#18102a','#1e0428','#081022'][Math.floor(Math.random()*5)]});
}

function drawBG(){
  const sky=X.createLinearGradient(0,0,0,G); sky.addColorStop(0,'#04011a');sky.addColorStop(.55,'#0c0630');sky.addColorStop(1,'#190a44');
  X.fillStyle=sky;X.fillRect(0,0,W,H);
  stars.forEach(s=>{ X.globalAlpha=.42+.58*Math.abs(Math.sin(s.t+frm*.022)); X.fillStyle='#fff';X.beginPath();X.arc(s.x,s.y,s.r,0,Math.PI*2);X.fill(); });
  X.globalAlpha=1;
  bldgs.forEach(b=>{ X.fillStyle=b.col;X.fillRect(b.x,b.y,b.w,b.h); });
  X.fillStyle='#0b0620';X.fillRect(0,G,W,H-G);
}

function drawRedCandle(x,y,w,h){
  X.fillStyle='#ee1818'; X.fillRect(x+5,y,w-10,h);
  X.fillStyle='#f0c040'; X.textAlign='center'; X.font='16px Arial'; X.fillText('▼', x+w/2, y+h/2);
}

function update(){
  if(ST!=='playing') return;
  frm++; spd=Math.min(5+score*.002,12);
  P.vy+=P.grav; P.y+=P.vy;
  if(P.grounded){ P.y=G-(P.ducking?DH:PH); P.vy=0; P.jumps=2; }
  if(frm%5===0) score++;
  
  if(Math.random()<.015) obs.push({x:W, y:G-70, w:40, h:70});
  
  obs.forEach((o,i)=>{
    o.x-=spd;
    // Hop on top check
    if(P.vy>0 && P.y+PH < o.y+10 && P.x+40 > o.x && P.x+40 < o.x+o.w){
      P.vy=-10; P.jumps=2; score+=50; obs.splice(i,1);
    } 
    // Hit side
    else if(P.x+HBX < o.x+o.w && P.x+HBX+HBW > o.x && P.y+HBY < o.y+o.h && P.y+HBY+HBH > o.y){
      ST='gameover';
    }
    if(o.x+o.w<0) obs.splice(i,1);
  });
}

function draw(){
  X.clearRect(0,0,W,H); drawBG();
  obs.forEach(o=>drawRedCandle(o.x,o.y,o.w,o.h));
  X.fillStyle='#f0c040'; X.fillRect(P.x, P.y, 40, P.ducking?DH:PH);
  X.fillStyle='#fff'; X.fillText(`Score: ${score}`, 20, 30);

  if(ST==='gameover'){
    X.fillStyle='rgba(0,0,0,.8)'; X.fillRect(0,0,W,H);
    X.fillStyle='#fff'; X.textAlign='center';
    X.fillText('GAME OVER', W/2, 150);
    if(!waitingForName){
      X.fillText('Press SPACE to Play Again', W/2, 200);
      if(score > best){
        X.fillText('New High Score! Press Y to add to Leaderboard', W/2, 240);
      }
    } else {
      X.fillText('Enter Name...', W/2, 200);
    }
  }
}

document.addEventListener('keydown', e=>{
  if(ST==='playing' && (e.code==='Space'||e.code==='ArrowUp')){ if(P.jumps>0){ P.vy=-10; P.jumps--; } }
  if(ST==='gameover'){
    if(e.code==='Space' && !waitingForName){ ST='start'; score=0; obs=[]; P.y=G-PH; }
    if(e.code==='KeyY' && score > best && !waitingForName){
      waitingForName = true;
      let name = prompt("Enter your name:");
      if(name) saveLB(name, score);
      best = score;
      waitingForName = false;
    }
  }
});

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
