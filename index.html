<script>
// 1. SUPABASE CONFIG
const SUPABASE_URL = 'https://bstybppivgbezlimzck.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ZmiGgH2vTdKCdj-eUfzMHg_yS2Jc0tD';

async function submitScore(name, score) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/leaderboard`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ player_name: name, score: score })
    });
  } catch (e) { console.error("Leaderboard Error:", e); }
}

// 2. GAME VARIABLES
const C=document.getElementById('c'), X=C.getContext('2d');
const W=900,H=420,G=330;
const PH=90,DH=42;
const HBX=16,HBY=16,HBW=40,HBH=PH-24;
const wizardImg = new Image(); wizardImg.src = 'mavensbot.png';

let ST='start',score=0,best=0,frm=0,spd=5;
let oTimer=0,cTimer=0,puTimer=0,invTimer=0,multiTimer=0,duckHeld=false;
let obs=[],coins=[],parts=[],floats=[],pups=[];

const P={
  x:82, y:G-PH, vy:0, grav:.58, jp:-14.5,
  jumps:2, af:0, at:0, ducking:false,
  get grounded(){return this.y>=(G-(this.ducking?DH:PH))-1;}
};

// 3. GAME HELPERS
CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const rr=Math.min(r,Math.min(w/2,h/2));
    this.moveTo(x+rr,y);this.lineTo(x+w-rr,y);this.arcTo(x+w,y,x+w,y+rr,rr);
    this.lineTo(x+w,y+h-rr);this.arcTo(x+w,y+h,x+w-rr,y+h,rr);
    this.lineTo(x+rr,y+h);this.arcTo(x,y+h,x,y+h-rr,rr);
    this.lineTo(x,y+rr);this.arcTo(x,y,x+rr,y,rr);this.closePath();return this;
};

function hits(ax,ay,aw,ah,bx,by,bw,bh){ return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by; }
function burst(x,y,col,n){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2,s=1.5+Math.random()*5.5; parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,life:1,col,sz:3+Math.random()*5.5}); } }
function flt(x,y,txt,col){ floats.push({x,y,txt,col:col||'#f0c040',life:1}); }

// 4. GAME OVER LOGIC
function gameOver(){
  ST='gameover';
  if(score>best)best=score;
  burst(P.x+40,P.y+45,'#ff3030',22);
  const name = prompt("RUG PULLED! Enter your name for the leaderboard:");
  if (name) submitScore(name, score);
}

function startGame(){
  ST='playing';score=0;frm=0;spd=5;
  obs=[];coins=[];parts=[];floats=[];pups=[];
  P.y=G-PH;P.vy=0;P.jumps=2;P.af=0;P.at=0;P.ducking=false;
}

// 5. LOOP
function loop(){ 
  // Ensure your update() and draw() functions are defined in your original code
  // If you are missing update() or draw(), they must be pasted here
  if(typeof update !== 'undefined') update();
  if(typeof draw !== 'undefined') draw();
  requestAnimationFrame(loop); 
}
loop();
