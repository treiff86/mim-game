function doJump() {
  if (ST === 'gameover_input') return; // Blocks jumping/restarting while naming
  if (ST === 'start' || ST === 'gameover_leaderboard') { startGame(); return; }
  
  if (P.jumps > 0) { 
    const by = P.y + (P.ducking ? DH : PH); 
    P.ducking = false; 
    P.vy = P.jp; 
    P.jumps--; 
    burst(P.x + 40, by, '#7050ff', 7); 
  }
}

function duckOn() { duckHeld = true; } 
function duckOff() { duckHeld = false; }

document.addEventListener('keydown', e => { 
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doJump();} 
  if(e.code==='ArrowDown'||e.code==='KeyZ'||e.code==='KeyX'){e.preventDefault();duckOn();} 
});
document.addEventListener('keyup', e => { 
  if(e.code==='ArrowDown'||e.code==='KeyZ'||e.code==='KeyX')duckOff(); 
});

C.addEventListener('click', e => { 
  if (ST === 'gameover_input') return;
  const r = C.getBoundingClientRect(); const tx = (e.clientX - r.left) * (W / r.width); 
  if (tx > W * .55) { duckOn(); setTimeout(duckOff, 280); } else doJump(); 
});
C.addEventListener('touchstart', e => { 
  if (ST === 'gameover_input') return;
  e.preventDefault(); const r = C.getBoundingClientRect(); const tx = (e.touches[0].clientX - r.left) * (W / r.width); 
  if (tx > W * .55) duckOn(); else doJump(); 
}, { passive: false });
C.addEventListener('touchend', e => { e.preventDefault(); duckOff(); }, { passive: false });

// ═══════════════════════════════════════════════════

function startGame() { 
  ST='playing';score=0;frm=0;spd=5; obs=[];coins=[];parts=[];floats=[];pups=[]; oTimer=0;cTimer=0;puTimer=0;invTimer=0;multiTimer=0;duckHeld=false; P.y=G-PH;P.vy=0;P.jumps=2;P.af=0;P.at=0;P.ducking=false; 
}

function gameOver() {
  ST = 'gameover_input';
  if (score > best) best = score;
  burst(P.x + 40, P.y + 45, '#ff3030', 22);
  
  // Show UI instead of prompt
  setTimeout(() => {
    document.getElementById('name-entry').style.display = 'flex';
    nameInput.focus();
  }, 800);
}

window.submitName = async function() {
  const input = document.getElementById('name-input');
  const btn = document.getElementById('submit-btn');
  const name = input.value.trim().substring(0, 10) || 'ANON';
  
  btn.innerText = 'SAVING...';
  btn.disabled = true;
  
  await submitScore(name, score);
  
  document.getElementById('name-entry').style.display = 'none';
  ST = 'gameover_leaderboard';
  input.value = '';
  btn.innerText = 'Submit & View Leaderboard';
  btn.disabled = false;
};

function spawnObs(){ const r=Math.random(); if(r<.42){ obs.push({type:'cs',x:W+60,y:G-72,w:40,h:72}); }else if(r<.74){ obs.push({type:'ct',x:W+60,y:G-120,w:40,h:120}); }else{ obs.push({type:'rug',x:W+80,y:188,w:140,h:66}); } }
function spawnCoin(){ const h=Math.random()<.5?G-185:G-52; coins.push({x:W+22,y:h,r:19,bob:Math.random()*Math.PI*2}); }
function spawnPup(){ pups.push({type:Math.random()<.5?'inv':'multi', x:W+30,y:G-68,bob:Math.random()*Math.PI*2}); }

function update(){
  if(ST!=='playing')return; frm++; spd=Math.min(5+score*.012,16); if(invTimer>0)invTimer--; if(multiTimer>0)multiTimer--;
  if(P.grounded){ if(duckHeld&&!P.ducking){P.ducking=true;P.vy=0;P.y=G-DH;} else if(!duckHeld&&P.ducking){P.ducking=false;P.y=G-PH;} }
  P.vy+=P.grav;P.y+=P.vy; const gH=P.ducking?DH:PH; if(P.y+gH>=G){P.y=G-gH;P.vy=0;P.jumps=2;} if(P.grounded){P.at++;if(P.at>=8){P.at=0;P.af++;}}else P.af++; if(frm%5===0)score++;
  const gap=Math.max(50,122-score*.22); oTimer++;if(oTimer>=gap+Math.random()*55){oTimer=0;spawnObs();} cTimer++;if(cTimer>=90){cTimer=0;spawnCoin();} puTimer++;if(puTimer>=290+Math.random()*160){puTimer=0;spawnPup();}
  const phx=P.x+HBX, phy=P.y+HBY, phw=HBW, phh=HBH, dhx=P.x+12, dhy=P.y+5, dhw=48, dhh=DH-9, ax=P.ducking?dhx:phx, ay=P.ducking?dhy:phy, aw=P.ducking?dhw:phw, ah=P.ducking?dhh:phh;
  for(let i=obs.length-1;i>=0;i--){
    const o=obs[i]; o.x-=spd; if(o.x+o.w<0){obs.splice(i,1);continue;}
    if(o.type==='rug'){ const rhx=P.x+10; const rhy=P.ducking?P.y+2:P.y; const rhw=48; const rhh=P.ducking?DH-4:PH-4; if(hits(rhx,rhy,rhw,rhh,o.x+6,o.y+5,o.w-12,o.h-8)){ if(invTimer>0){ burst(o.x+o.w*.5,o.y+o.h*.5,'#f0f000',14); flt(o.x+o.w*.5,o.y,'💥 RUG SMASHED!','#f0f000'); obs.splice(i,1); }else{gameOver();return;} } }
    else{ const feetY=P.y+PH; const prevFeetY=feetY-P.vy; const xOver=P.x+20<o.x+o.w&&P.x+62>o.x; if(P.vy>0&&prevFeetY<=o.y+10&&feetY>=o.y-10&&xOver){ P.y=o.y-PH;P.vy=-12.5;P.jumps=2; const val=(multiTimer>0?5:1)*25; score+=val; burst(o.x+o.w*.5,o.y-5,'#f0c040',18); burst(o.x+o.w*.5,o.y-5,'#ff4040',10); flt(o.x+o.w*.5,o.y-18,`💥 +${val} $MIM!`,'#ffaa00'); obs.splice(i,1); continue; } if(hits(ax,ay,aw,ah,o.x+7,o.y+9,o.w-14,o.h-14)){ if(invTimer>0){ burst(o.x+o.w*.5,o.y+o.h*.5,'#f0f000',14); flt(o.x+o.w*.5,o.y,'💥 SMASHED!','#f0f000'); obs.splice(i,1); }else{gameOver();return;} } }
  }
  for(let i=coins.length-1;i>=0;i--){ const c=coins[i]; c.x-=spd;c.y+=Math.sin(frm*.1+c.bob)*.8; if(c.x+c.r<0){coins.splice(i,1);continue;} if(hits(phx,phy,phw,phh,c.x-c.r,c.y-c.r,c.r*2,c.r*2)){ coins.splice(i,1); const val=multiTimer>0?50:10; score+=val; burst(c.x,c.y,'#f0c040',8); flt(c.x,c.y,`+${val}${multiTimer>0?' x5!':''}$MIM`,'#f0c040'); } }
  for(let i=pups.length-1;i>=0;i--){ const p=pups[i]; p.x-=spd;p.y+=Math.sin(frm*.08+p.bob)*.7; if(p.x+55<0){pups.splice(i,1);continue;} if(hits(phx,phy,phw,phh,p.x,p.y,46,60)){ pups.splice(i,1); if(p.type==='inv'){ invTimer=300;burst(P.x+40,P.y+45,'#f0f000',16); flt(P.x+40,P.y,'🛡 INVINCIBLE! 5s','#f0f000'); }else{ multiTimer=300;burst(P.x+40,P.y+45,'#cc00ff',16); flt(P.x+40,P.y,'₿ x5 COINS! 5s','#cc00ff'); } } }
  for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.vx*=.95; p.life-=.035;p.sz*=.96; if(p.life<=0)parts.splice(i,1); }
  for(let i=floats.length-1;i>=0;i--){ floats[i].y-=1.6;floats[i].life-=.03; if(floats[i].life<=0)floats.splice(i,1); }
  stars.forEach(s=>{s.x-=s.sp;if(s.x<0)s.x=W;}); bldgs.forEach(b=>{b.x-=spd*.27;if(b.x+b.w<0)b.x=W+55;});
}

function draw(){
  X.clearRect(0,0,W,H); drawBG();
  coins.forEach(c=>drawCoin(c.x,c.y,c.r));
  pups.forEach(p=>{ if(p.type==='inv')drawGreenCandle(p.x,p.y); else drawWandPup(p.x,p.y); });
  obs.forEach(o=>{ if(o.type==='rug')drawRug(o.x,o.y,o.w,o.h); else drawRedCandle(o.x,o.y,o.w,o.h); });
  drawWizard(P.x,P.y);
  if(!P.grounded&&P.jumps>0){ X.fillStyle='#8060ff';X.shadowColor='#8060ff';X.shadowBlur=10; X.beginPath();X.arc(P.x+40,P.y-15,8,0,Math.PI*2);X.fill();X.shadowBlur=0; X.fillStyle='#fff';X.font='bold 9px Arial';X.textAlign='center';X.textBaseline='middle';X.fillText('2↑',P.x+40,P.y-14); }
  if(P.ducking){ X.fillStyle='#40ff80';X.font='bold 12px Arial';X.textAlign='center';X.textBaseline='alphabetic';X.fillText('⬇ DUCK!',P.x+40,P.y-7); }
  parts.forEach(p=>{ X.globalAlpha=p.life;X.fillStyle=p.col; X.beginPath();X.arc(p.x,p.y,p.sz,0,Math.PI*2);X.fill(); }); X.globalAlpha=1;
  floats.forEach(f=>{ X.globalAlpha=f.life;X.strokeStyle='#000';X.lineWidth=3;X.textAlign='center';X.textBaseline='alphabetic'; X.strokeText(f.txt,f.x,f.y);X.fillStyle=f.col;X.fillText(f.txt,f.x,f.y); }); X.globalAlpha=1;
  drawHUD();
  
  if(ST==='start'){ 
    X.fillStyle='rgba(3,1,16,.88)';X.fillRect(0,0,W,H); X.shadowColor='#f0c040';X.shadowBlur=28; 
    X.font='bold 60px Arial Black';X.textAlign='center';X.textBaseline='alphabetic'; 
    X.strokeStyle='#4a2800';X.lineWidth=6; 
    X.strokeText('$MIM RUNNER v2',W*.5,140);X.fillStyle='#f0c040';X.fillText('$MIM RUNNER v2',W*.5,140);X.shadowBlur=0; 
    X.font='bold 18px Arial';X.fillStyle='#90ff40';X.strokeText('MAGIC INTERNET MONEY · ORDINALS · RUNE · BITCOIN',W*.5,174);X.fillText('MAGIC INTERNET MONEY · ORDINALS · RUNE · BITCOIN',W*.5,174); 
    if(Math.floor(frm/28)%2===0){ 
      X.font='bold 20px Arial Black';X.fillStyle='#fff'; 
      X.strokeText('▶  PRESS SPACE / TAP LEFT TO START  ◀',W*.5,238);X.fillText('▶  PRESS SPACE / TAP LEFT TO START  ◀',W*.5,238); 
    } 
    X.font='14px Arial';X.fillStyle='#8878aa';X.fillText('SPACE / ↑ = JUMP (double jump!)  ·  Z, X, ↓ = DUCK under flying rugs',W*.5,278);X.fillText('🟩 GREEN CANDLE = 5s INVINCIBLE  |  ⚡ WAND = 5x COINS 5s',W*.5,300); 
  }
  
  if(ST==='gameover_input' || ST==='gameover_leaderboard'){
    X.fillStyle='rgba(3,1,16,.88)';X.fillRect(0,0,W,H); 
    X.shadowColor='#ff4040';X.shadowBlur=22; 
    X.font='bold 60px Arial Black';X.textAlign='center';X.textBaseline='alphabetic'; 
    X.strokeText('RUG PULLED! 💀',W*.5,145);X.fillStyle='#ff3030';X.fillText('RUG PULLED! 💀',W*.5,145);X.shadowBlur=0; 
    
    X.font='bold 29px Arial';X.fillStyle='#f0c040'; 
    X.strokeText(`$MIM EARNED: ${score}`,W*.5,196);X.fillText(`$MIM EARNED: ${score}`,W*.5,196); 
    
    if(score>0&&score===best){ 
      X.fillStyle='#90ff40';X.font='bold 21px Arial';X.fillText('✨ NEW HIGH SCORE! ✨',W*.5,234); 
    } else { 
      X.fillStyle='#aaa';X.font='20px Arial';X.fillText(`Best: ${best}`,W*.5,234); 
    } 

    if (ST === 'gameover_leaderboard') {
      drawLeaderboard();
      if(Math.floor(frm/28)%2===0){ 
        X.font='bold 18px Arial Black';X.fillStyle='#fff'; 
        X.textAlign = 'center';
        X.strokeText('▶ SPACE / TAP TO RESTART ◀',W*.5,405);
        X.fillText('▶ SPACE / TAP TO RESTART ◀',W*.5,405); 
      }
    }
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
fetchLeaderboard();
loop();
</script>
